<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAFE Farms — 4,000+ Yield Farms</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e1a;
            color: #eef2f8;
            overflow-x: hidden;
            line-height: 1.6;
        }
        a { color: #00e5ff; text-decoration: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .glow { position: fixed; border-radius: 50%; filter: blur(150px); opacity: 0.2; pointer-events: none; z-index: 0; }
        .glow-1 { width: 600px; height: 600px; background: #14f195; top: -200px; left: -300px; }
        .glow-2 { width: 600px; height: 600px; background: #9945ff; bottom: -200px; right: -300px; }

        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 10px 0; background: rgba(11,14,26,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 20px; }
        .logo img { height: 32px; border-radius: 8px; }
        .logo span { background: linear-gradient(135deg, #14f195, #9945ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 13px; font-weight: 600; }
        .nav-links a { color: #b0b8d1; padding: 6px 12px; border-radius: 8px; transition: 0.2s; }
        .nav-links a:hover { color: #fff; background: rgba(153,69,255,0.1); }
        .nav-links .active { color: #14f195; }
        .nav-links .btn-home { border: 1px solid #9945ff; padding: 6px 18px; border-radius: 40px; color: #fff !important; }

        .page-header { margin-top: 70px; padding: 30px 0 20px; text-align: center; position: relative; z-index: 2; }
        .page-header h1 { font-size: 2.5rem; font-weight: 900; }
        .page-header h1 span { background: linear-gradient(135deg, #14f195, #9945ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header p { color: #8892b0; margin-top: 6px; font-size: 1rem; }

        .stats-bar { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; padding: 16px 0; max-width: 1000px; margin: 0 auto; }
        .stat-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); padding: 10px 14px; border-radius: 12px; text-align: center; }
        .stat-box .num { font-size: 1.1rem; font-weight: 700; color: #14f195; }
        .stat-box .lbl { font-size: 0.6rem; color: #8892b0; text-transform: uppercase; letter-spacing: 0.3px; }

        .filter-bar { position: relative; z-index: 2; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); margin-bottom: 16px; }
        .filter-bar button { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: #b0b8d1; padding: 5px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .filter-bar button:hover { border-color: #9945ff; color: #fff; }
        .filter-bar button.active { background: rgba(153,69,255,0.15); border-color: #9945ff; color: #fff; }

        .farms-grid { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 16px 0 40px; }
        .farm-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; padding: 16px; transition: 0.2s; }
        .farm-card:hover { border-color: #14f195; transform: translateY(-3px); background: rgba(20,241,149,0.04); }
        .farm-card .pair { font-size: 1rem; font-weight: 700; }
        .farm-card .apy { font-size: 1.6rem; font-weight: 800; color: #14f195; }
        .farm-card .tvl { font-size: 0.8rem; color: #8892b0; }
        .farm-card .rewards { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .farm-card .rewards span { background: rgba(255,255,255,0.04); padding: 2px 10px; border-radius: 20px; font-size: 10px; color: #b0b8d1; }

        footer { position: relative; z-index: 2; padding: 24px 0; border-top: 1px solid rgba(255,255,255,0.04); text-align: center; color: #8892b0; font-size: 0.75rem; }
        footer .links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
        footer .links a { color: #b0b8d1; font-size: 12px; }
        footer .links a:hover { color: #fff; }

        @media (max-width: 700px) {
            .header-inner { flex-direction: column; align-items: stretch; text-align: center; }
            .nav-links { justify-content: center; }
            .page-header h1 { font-size: 1.8rem; }
            .farms-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="https://raw.githubusercontent.com/eximtrustoilbank-sudo/safe/refs/heads/main/safe_logo.jpg" alt="SAFE">
            <span>SAFE</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="trade.html">Trade</a>
            <a href="farms.html" class="active">Farms</a>
            <a href="analytics.html">Analytics</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="index.html" class="btn-home">← Back</a>
        </div>
    </div>
</header>

<div class="page-header container">
    <h1>💧 <span>Yield Farms</span></h1>
    <p>4,000+ farms — earn passive income with SAFE liquidity pools</p>
</div>

<div class="container stats-bar" id="statsBar"></div>

<div class="container filter-bar" id="filterBar"></div>

<div class="container farms-grid" id="farmsGrid"></div>

<footer>
    <div class="container">
        <div class="links">
            <a href="index.html">Home</a>
            <a href="trade.html">Trade</a>
            <a href="farms.html">Farms</a>
            <a href="analytics.html">Analytics</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="insurance.html">Insurance</a>
            <a href="bridges.html">Bridges</a>
            <a href="bots.html">Bots</a>
        </div>
        <div>📜 5HudMVeZpwdcsajr75hTCipr9Yd8KJ9GfCowqU5T8GS</div>
        <div style="margin-top:6px;font-size:0.65rem;color:#5a6488;">© 2026 SAFE Protocol — 4,000+ yield farms | Built on Solana 🛡️</div>
    </div>
</footer>

<script>
    // ============================================================
    // 4,000+ ФЕРМ — ПОЛНЫЙ ГЕНЕРАТОР
    // ============================================================

    const farmCategories = [
        { id: 'all', label: '🔥 All Farms' },
        { id: 'stable', label: '💰 Stable Pairs' },
        { id: 'volatile', label: '📈 Volatile Pairs' },
        { id: 'single', label: '🪙 Single Staking' },
        { id: 'boosted', label: '⚡ Boosted APR' },
        { id: 'new', label: '🆕 New Listings' }
    ];

    function generateFarms(count) {
        const farms = [];
        const pairs = ['SAFE/USDC', 'SAFE/USDT', 'SAFE/SOL', 'SAFE/JUP', 'SAFE/BONK', 'SAFE/WIF', 'SAFE/MEI', 'SAFE/ORCA', 'SAFE/RAY', 'SAFE/KMNO'];
        const rewards = ['SAFE', 'USDC', 'SOL', 'JUP', 'BONK', 'WIF', 'MEI', 'ORCA', 'RAY', 'KMNO'];
        const types = ['Stable', 'Volatile', 'Single', 'Boosted', 'New'];
        for (let i = 0; i < count; i++) {
            const pair = pairs[i % pairs.length];
            const baseAPY = 50 + Math.random() * 500;
            const tvl = 10000 + Math.random() * 2000000;
            const rewardCount = 1 + Math.floor(Math.random() * 3);
            const rewardList = [];
            for (let r = 0; r < rewardCount; r++) {
                rewardList.push(rewards[(i + r) % rewards.length]);
            }
            farms.push({
                pair: pair,
                apy: Math.round(baseAPY * 10) / 10,
                tvl: Math.round(tvl / 1000) * 1000,
                rewards: rewardList,
                type: types[i % types.length],
                id: i + 1
            });
        }
        return farms;
    }

    const allFarms = generateFarms(4200);
    let currentFilter = 'all';

    function renderStats() {
        const el = document.getElementById('statsBar');
        const totalTVL = allFarms.reduce((sum, f) => sum + f.tvl, 0);
        const avgAPY = allFarms.reduce((sum, f) => sum + f.apy, 0) / allFarms.length;
        el.innerHTML = `
            <div class="stat-box"><div class="num">${allFarms.length.toLocaleString()}</div><div class="lbl">Total Farms</div></div>
            <div class="stat-box"><div class="num">$${(totalTVL/1000000).toFixed(1)}M</div><div class="lbl">Total TVL</div></div>
            <div class="stat-box"><div class="num">${Math.round(avgAPY)}%</div><div class="lbl">Avg. APR</div></div>
            <div class="stat-box"><div class="num">${Math.max(...allFarms.map(f => f.apy)).toFixed(0)}%</div><div class="lbl">Top APR</div></div>
        `;
    }
    renderStats();

    function renderFilters() {
        const el = document.getElementById('filterBar');
        el.innerHTML = farmCategories.map(c => `
            <button class="${c.id === 'all' ? 'active' : ''}" data-filter="${c.id}">${c.label}</button>
        `).join('');
        el.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                el.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderFarms(currentFilter);
            });
        });
    }
    renderFilters();

    function renderFarms(filter) {
        const el = document.getElementById('farmsGrid');
        let filtered = allFarms;
        if (filter === 'stable') filtered = allFarms.filter(f => f.type === 'Stable');
        else if (filter === 'volatile') filtered = allFarms.filter(f => f.type === 'Volatile');
        else if (filter === 'single') filtered = allFarms.filter(f => f.type === 'Single');
        else if (filter === 'boosted') filtered = allFarms.filter(f => f.type === 'Boosted');
        else if (filter === 'new') filtered = allFarms.filter(f => f.type === 'New');
        // Показываем первые 500
        const display = filtered.slice(0, 500);
        el.innerHTML = display.map(f => `
            <div class="farm-card">
                <div class="pair">${f.pair}</div>
                <div class="apy">${f.apy}% APR</div>
                <div class="tvl">TVL: $${(f.tvl/1000).toFixed(0)}K</div>
                <div class="rewards">${f.rewards.map(r => `<span>${r}</span>`).join('')}</div>
            </div>
        `).join('');
        document.querySelector('.page-header p').textContent = 
            `${filtered.length.toLocaleString()} farms — earn passive income with SAFE liquidity pools`;
    }
    renderFarms('all');

    console.log('✅ SAFE Farms: 4,200+ ферм загружено');
</script>
</body>
</html>
